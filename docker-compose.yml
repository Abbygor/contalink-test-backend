services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - redis
    command: python manage.py runserver 0.0.0.0:8000

  worker:
    build: .
    env_file:
      - .env
    depends_on:
      - redis
    command: celery -A config worker --loglevel=info --pool=solo

  beat:
    build: .
    env_file:
      - .env
    depends_on:
      - redis
    command: celery -A config beat --loglevel=info